<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ISNN</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="logo.png" alt="ISNN logo" class="logo" />
      <div class="site-title">ISNN</div>
    </div>
    <nav class="main-nav">
      <a href="#" class="nav-link">Home</a>
      <a href="#" class="nav-link">Politics</a>
      <a href="#" class="nav-link">World</a>
      <a href="#" class="nav-link">Business</a>
      <a href="#" class="nav-link">Science</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero-title">Iranian State News Network</h1>
      <p class="hero-sub">Reliable reporting, no ads, clear layout.</p>
    </section>

    <section class="articles-grid" id="articlesGrid">
      <!-- Article cards inserted here or hard-coded below -->
      <article class="card" data-id="example-1">
        <img class="card-image" src="example-article.jpg" alt="Example article image" />
        <h2 class="card-title">Example: Regional Developments in the Middle East</h2>
        <p class="card-excerpt">A concise summary of the article to draw readers in.</p>
        <div class="card-actions">
          <button class="read-btn" data-id="example-1">Read article</button>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div>© <span id="year"></span> ISNN</div>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
