<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1c1a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --stone: #8a7f72;
    --text: #f0ebe3;
    --muted: #6b6059;
    --green: #4a9e6b;
    --red: #b85c4a;
    --hint: #5a7fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    text-align: center;
    padding: 32px 20px 20px;
    border-bottom: 1px solid #2a2520;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: var(--gold);
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .score-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--stone);
  }

  .score-val { color: var(--gold-light); font-weight: 700; font-size: 18px; }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 16px;
  }

  /* Photo display */
  .photo-section {
    position: relative;
    margin-bottom: 28px;
  }

  .photo-frame {
    width: 100%;
    aspect-ratio: 4/3;
    max-height: 420px;
    border: 1px solid #2e2820;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    background: #111;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s ease;
  }

  .photo-frame img.loading { opacity: 0; }
  .photo-frame img.loaded { opacity: 1; }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.7));
    pointer-events: none;
  }

  .photo-counter {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 1px;
  }

  /* Navigation arrows for multiple photos */
  .photo-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 12px;
    pointer-events: none;
  }

  .photo-nav button {
    pointer-events: all;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--stone);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }

  .photo-nav button:hover { border-color: var(--gold); background: rgba(0,0,0,0.85); }

  /* Hint section */
  .hint-section {
    background: rgba(90, 127, 168, 0.1);
    border: 1px solid var(--hint);
    border-radius: 2px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 12px;
    color: #8ab4d8;
    display: none;
    animation: fadeSlide 0.3s ease;
  }

  .hint-section.visible { display: block; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hint-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--hint);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .hint-text { font-size: 14px; color: #a8c8e8; }

  /* Answer grid */
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .answer-btn {
    background: var(--card);
    border: 1px solid #2e2820;
    color: var(--stone);
    padding: 10px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold-light);
    background: #221f1a;
  }

  .answer-btn.correct {
    background: rgba(74, 158, 107, 0.15);
    border-color: var(--green);
    color: var(--green);
  }

  .answer-btn.wrong {
    background: rgba(184, 92, 74, 0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .answer-btn.reveal {
    background: rgba(201, 168, 76, 0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  .answer-btn:disabled { cursor: default; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
  }

  .btn-hint {
    background: transparent;
    border-color: var(--hint);
    color: var(--hint);
  }
  .btn-hint:hover { background: rgba(90,127,168,0.15); }

  .btn-skip {
    background: transparent;
    border-color: var(--muted);
    color: var(--muted);
  }
  .btn-skip:hover { border-color: var(--stone); color: var(--stone); }

  .btn-next {
    background: var(--gold);
    border-color: var(--gold);
    color: #0d0d0d;
    font-weight: 700;
    display: none;
  }
  .btn-next:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn-next.visible { display: block; }

  .feedback {
    flex: 1;
    font-size: 12px;
    letter-spacing: 1px;
    min-width: 120px;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }

  .streak-badge {
    display: none;
    background: var(--gold);
    color: #0d0d0d;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .streak-badge.visible { display: inline-block; }

  /* Category filter */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 24px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid #2e2820;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--stone); color: var(--stone); }
  .filter-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

  .loading-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .gem-icon {
    display: inline-block;
    margin-right: 6px;
    animation: spin 3s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <h1>Mineral Identification</h1>

  </div>

  <!-- Controls -->

// Wikimedia Commons API to get real photos
async function getWikimediaPhotos(searchTerm, count = 3) {
  const encodedSearch = encodeURIComponent(searchTerm);
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodedSearch}&srnamespace=6&srlimit=${count + 5}&format=json&origin=*`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    const titles = (data.query?.search || []).map(r => r.title).filter(t => /\.(jpg|jpeg|png|webp)/i.test(t));
    
    const imageUrls = [];
    for (const title of titles.slice(0, count + 2)) {
      const imgUrl = await getImageUrl(title);
      if (imgUrl) imageUrls.push(imgUrl);
      if (imageUrls.length >= count) break;
    }
    return imageUrls;
  } catch {
    return [];
  }
}

async function getImageUrl(title) {
  const encoded = encodeURIComponent(title);
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encoded}&prop=imageinfo&iiprop=url&iiurlwidth=600&format=json&origin=*`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const pages = Object.values(data.query?.pages || {});
    const info = pages[0]?.imageinfo?.[0];
    return info?.thumburl || info?.url || null;
  } catch {
    return null;
  }
}

// State
let minerals = [...MINERALS];
let currentMineral = null;
let currentPhotos = [];
let currentPhotoIndex = 0;
let answered = false;
let streak = 0;
let correctCount = 0;
let totalCount = 0;
let usedIndices = [];
let selectedFamily = 'All';
let hintShown = false;

// Build family filter
const families = ['All', ...new Set(MINERALS.map(m => {
  const f = m.family;
  if (f.includes('Carbonates')) return 'Carbonates';
  if (f.includes('Native')) return 'Native Elements';
  if (f.includes('Oxide')) return 'Oxide/Hydroxides';
  if (f.includes('Phosphates')) return 'Phosphates';
  if (f.includes('Sulfate')) return 'Sulfates';
  if (f.includes('Sulfide')) return 'Sulfides';
  if (f.includes('Silicate') || f.includes('Silicates')) return 'Silicates';
  if (f.includes('Halide')) return 'Halides';
  if (f.includes('Borates')) return 'Borates';
  return f;
}))];

const filterRow = document.getElementById('filterRow');
families.forEach(fam => {
  const chip = document.createElement('button');
  chip.className = 'filter-chip' + (fam === 'All' ? ' active' : '');
  chip.textContent = fam;
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedFamily = fam;
    usedIndices = [];
    nextMineral();
  };
  filterRow.appendChild(chip);
});

function getFilteredMinerals() {
  if (selectedFamily === 'All') return MINERALS;
  return MINERALS.filter(m => {
    const f = m.family;
    if (selectedFamily === 'Silicates') return f.includes('Silicate') || f.includes('Silicates');
    if (selectedFamily === 'Carbonates') return f.includes('Carbonate');
    if (selectedFamily === 'Native Elements') return f.includes('Native');
    if (selectedFamily === 'Oxide/Hydroxides') return f.includes('Oxide');
    if (selectedFamily === 'Phosphates') return f.includes('Phosphate');
    if (selectedFamily === 'Sulfates') return f.includes('Sulfate');
    if (selectedFamily === 'Sulfides') return f.includes('Sulfide');
    if (selectedFamily === 'Halides') return f.includes('Halide');
    if (selectedFamily === 'Borates') return f.includes('Borate');
    return f === selectedFamily;
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function nextMineral() {
  const pool = getFilteredMinerals();
  if (pool.length === 0) return;
  
  // Reset
  answered = false;
  hintShown = false;
  document.getElementById('hintSection').classList.remove('visible');
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn2').style.display = 'none';
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('skipBtn').disabled = false;
  document.getElementById('streakBadge').classList.remove('visible');

  // Pick random mineral
  let available = pool.filter((_, i) => !usedIndices.includes(pool.indexOf(MINERALS.find(m => m.name === pool[i]?.name))));
  if (available.length === 0) { usedIndices = []; available = pool; }
  currentMineral = available[Math.floor(Math.random() * available.length)];
  
  // Show loading
  const img = document.getElementById('mineralPhoto');
  const placeholder = document.getElementById('loadingPlaceholder');
  img.className = 'loading';
  placeholder.style.display = 'flex';
  document.getElementById('photoCounter').style.display = 'none';
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  // Build answer choices (4 options: correct + 3 wrong)
  buildAnswerGrid();

  // Fetch photos
  currentPhotos = [];
  currentPhotoIndex = 0;
  const photos = await getWikimediaPhotos(currentMineral.search, 4);
  currentPhotos = photos;
  
  if (currentPhotos.length > 0) {
    showPhoto(0);
  } else {
    placeholder.textContent = '⬡ No photo found — try skipping';
    placeholder.style.display = 'flex';
    img.style.display = 'none';
  }
}

function showPhoto(index) {
  const img = document.getElementById('mineralPhoto');
  const placeholder = document.getElementById('loadingPlaceholder');
  
  img.style.display = 'block';
  img.className = 'loading';
  img.src = currentPhotos[index];
  
  if (currentPhotos.length > 1) {
    document.getElementById('photoCounter').style.display = 'block';
    document.getElementById('photoCounter').textContent = `${index + 1} / ${currentPhotos.length}`;
    document.getElementById('prevBtn').style.display = index > 0 ? 'flex' : 'none';
    document.getElementById('nextBtn').style.display = index < currentPhotos.length - 1 ? 'flex' : 'none';
  }
}

function imgLoaded() {
  const img = document.getElementById('mineralPhoto');
  const placeholder = document.getElementById('loadingPlaceholder');
  img.className = 'loaded';
  placeholder.style.display = 'none';
}

function imgError() {
  currentPhotoIndex++;
  if (currentPhotoIndex < currentPhotos.length) {
    showPhoto(currentPhotoIndex);
  } else {
    document.getElementById('loadingPlaceholder').textContent = '⬡ Image failed — press Skip';
    document.getElementById('loadingPlaceholder').style.display = 'flex';
  }
}

function prevPhoto() {
  if (currentPhotoIndex > 0) {
    currentPhotoIndex--;
    showPhoto(currentPhotoIndex);
  }
}

function nextPhoto() {
  if (currentPhotoIndex < currentPhotos.length - 1) {
    currentPhotoIndex++;
    showPhoto(currentPhotoIndex);
  }
}

function buildAnswerGrid() {
  const grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  
  const pool = getFilteredMinerals().length >= 4 ? getFilteredMinerals() : MINERALS;
  const wrong = shuffle(pool.filter(m => m.name !== currentMineral.name)).slice(0, 3);
  const options = shuffle([currentMineral, ...wrong]);

  options.forEach(mineral => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = mineral.name;
    btn.onclick = () => checkAnswer(mineral.name, btn);
    grid.appendChild(btn);
  });
}

function checkAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  totalCount++;
  document.getElementById('total').textContent = totalCount;
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('skipBtn').disabled = true;

  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === currentMineral.name && b !== btn) b.classList.add('reveal');
  });

  if (chosen === currentMineral.name) {
    btn.classList.add('correct');
    correctCount++;
    streak++;
    document.getElementById('correct').textContent = correctCount;
    document.getElementById('streak').textContent = streak;
    const fb = document.getElementById('feedback');
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback correct';
    if (streak >= 3) {
      document.getElementById('streakBadge').textContent = `🔥 ${streak} Streak!`;
      document.getElementById('streakBadge').classList.add('visible');
    }
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.getElementById('streak').textContent = streak;
    const fb = document.getElementById('feedback');
    fb.textContent = `✗ That's ${currentMineral.name}`;
    fb.className = 'feedback wrong';
  }

  document.getElementById('nextBtn2').style.display = 'block';
}

function showHint() {
  if (hintShown) return;
  hintShown = true;
  document.getElementById('hintSection').classList.add('visible');
  document.getElementById('hintText').textContent = `Family: ${currentMineral.family}`;
}

function skipMineral() {
  nextMineral();
}

// Initialize
nextMineral();
</script>
</body>
</html>
